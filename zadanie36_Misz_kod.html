<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zadanie 36-Miszkiel</title>

<style>
body {
    background-color: #f06292; /* różowe tło */
    font-family: Arial;
}

/* H1 – różne obramowania */
h1 {
    background-color: yellow;
    text-align: center;
    border-top: 6px dotted black;
    border-bottom: 6px solid black;
    border-left: 6px groove black;
    border-right: 6px inset black;
    padding: 10px;
    width: 80%;
    margin: auto;
}

/* H2 – różne kolory obramowania */
h2 {
    background-color: #e57373;
    text-align: center;
    border-top: 8px solid yellow;
    border-bottom: 8px solid green;
    border-left: 8px solid black;
    border-right: 8px solid blue;
    padding: 10px;
    width: 70%;
    margin: auto;
}

/* H3 */
h3 {
    background-color: #64b5f6;
    text-align: center;
    border: 10px solid black;
    padding: 5px;
    width: 60%;
    margin: auto;
}

/* kontenery */
.box {
    background: linear-gradient(to right, #5c6bc0, #7986cb);
    border: 5px solid black;
    padding: 30px;
    margin: 20px;
}

/* linie HR */
hr.hr1 {
    height: 7px;
    background-color: blue;
    width: 100%;
}

hr.hr2 {
    height: 5px;
    background-color: grey;
    width: 100%;
}

hr.hr3 {
    height: 3px;
    background-color: yellow;
    width: 100%;
}

</style>
</head>

<body>



<div class="box">
    <h1>To jest przykład</h1>
</div>

<hr class="hr1">

<div class="box">
    <h2>To jest przykład wykonaj sam</h2>
</div>

<hr class="hr2">

<div class="box">
    <h3>To jest przykład wykonaj również</h3>
</div>

<hr class="hr3">

</body>
</html>
